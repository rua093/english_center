
services:
  php-apache:
    build: . # Thay vì dùng image gốc, ta gọi Dockerfile vừa tạo
    container_name: php_app
    ports:
      - "0.0.0.0:8080:80"
    volumes:
      - ./public_html:/var/www/html
      - ./src:/var/www/src
    networks:
      - app-network
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: english_center_db
      MYSQL_USER: user
      MYSQL_PASSWORD: 123456
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
